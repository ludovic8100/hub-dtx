name: Optimize logos
on:
  workflow_dispatch: {}
jobs:
  run:
    runs-on: ubuntu-latest
    env:
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install Pillow requests
      - run: python scripts/optimize_logos.py
