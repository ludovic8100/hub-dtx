name: Qlik Probe (recherche objet par description)
on:
  workflow_dispatch:
    inputs:
      probe_terms:
        description: "Termes recherchés dans Description (ex. une plaque)"
        required: false
        default: "2ahs210"
      probe_dossier:
        description: "Dossier à dumper entièrement (ex 2441/00). Prioritaire sur probe_terms."
        required: false
        default: ""
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r scripts/requirements.txt
      - name: Run probe
        env:
          QLIK_API_KEY: ${{ secrets.QLIK_API_KEY }}
          PROBE_TERMS: ${{ github.event.inputs.probe_terms }}
          PROBE_DOSSIER: ${{ github.event.inputs.probe_dossier }}
        run: python scripts/qlik_probe.py
